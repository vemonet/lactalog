<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <clipPath id="bodyClip"><rect x="180" y="170" width="152" height="262" rx="34"/></clipPath>
  </defs>
  <!-- tilted like a pen leaning right: bottom high-left, tip low-right -->
  <g transform="rotate(120 256 256)">
  <!-- nipple -->
  <path d="M244 60 q12 -12 24 0 q7 7 7 22 l4 24 h-46 l4 -24 q0 -15 7 -22 z" fill="#f5c26b"/>
  <!-- cap ring -->
  <rect x="204" y="104" width="104" height="34" rx="11" fill="#f0a94e"/>
  <!-- neck -->
  <rect x="212" y="132" width="88" height="46" rx="8" fill="#9ad3ef" stroke="#3a90c4" stroke-width="10"/>
  <!-- body -->
  <rect x="180" y="170" width="152" height="262" rx="34" fill="#eaf7fd"/>
  <!-- milk -->
  <rect x="180" y="300" width="152" height="132" fill="#7cc6ea" clip-path="url(#bodyClip)"/>
  <rect x="180" y="170" width="152" height="262" rx="34" fill="none" stroke="#3a90c4" stroke-width="12"/>
  <!-- measurement marks -->
  <g stroke="#3a90c4" stroke-width="8" stroke-linecap="round">
    <line x1="202" y1="238" x2="230" y2="238"/>
    <line x1="202" y1="272" x2="230" y2="272"/>
  </g>
  </g>
</svg>
